spring:
  datasource:
    url: jdbc:h2:file:./data/etfdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

etf:
  scrape:
    cron: "0 0 18 * * MON-FRI"
